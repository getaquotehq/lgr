<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-config.js"></script>
<script>
  const burger = document.getElementById('burger');
  const mobileMenu = document.getElementById('mobileMenu');
  const setMenu = open => {
    burger.classList.toggle('on', open);
    mobileMenu.classList.toggle('on', open);
    document.body.classList.toggle('menu-open', open);
    burger.setAttribute('aria-expanded', open);
  };
  burger.addEventListener('click', () => setMenu(!burger.classList.contains('on')));
  mobileMenu.querySelectorAll('a').forEach(a => a.addEventListener('click', () => setMenu(false)));

  /* ---- Trade picker: render niches live from Supabase ---- */
  (function(){
    const grid = document.getElementById('trades');
    const cfg = window.LGR_SUPABASE || {};
    const esc = s => (s==null?'':String(s)).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    const href = slug => slug === 'solar' ? '/solar-leads' : '/' + slug + '-leads';
    const label = n => n.slug === 'solar' ? 'solar' : n.name.toLowerCase();
    const cardLive = n =>
      '<a href="'+href(n.slug)+'" class="trade live">'
      + '<div class="trade-top"><h3>'+esc(n.name)+'</h3><span class="pill open">Live</span></div>'
      + '<p>'+esc(n.short_desc||'')+'</p>'
      + '<span class="btn btn-primary">View '+esc(label(n))+' leads →</span></a>';
    const cardSoon = n =>
      '<div class="trade soon">'
      + '<div class="trade-top"><h3>'+esc(n.name)+'</h3><span class="pill soon">Coming soon</span></div>'
      + '<p>'+esc(n.short_desc||'')+'</p>'
      + '<span class="btn btn-ghost" aria-disabled="true">Coming soon</span></div>';
    async function loadTrades(){
      if(!cfg.url || !cfg.anonKey || cfg.anonKey.indexOf('__') === 0){
        grid.innerHTML = '<div class="data-error">Trade data temporarily unavailable.</div>';
        grid.removeAttribute('aria-busy'); return;
      }
      try{
        const sb = supabase.createClient(cfg.url, cfg.anonKey);
        const { data, error } = await sb.from('niches')
          .select('slug,name,short_desc,status,sort_order')
          .in('status', ['live','coming_soon'])
          .order('sort_order', { ascending:true })
          .order('name', { ascending:true });
        if(error) throw error;
        grid.innerHTML = (data && data.length)
          ? data.map(n => n.status === 'live' ? cardLive(n) : cardSoon(n)).join('')
          : '<div class="data-error">No trades available yet.</div>';
      }catch(e){
        console.error('niches load failed', e);
        grid.innerHTML = '<div class="data-error">Trade data temporarily unavailable. Please try again shortly.</div>';
      }finally{
        grid.removeAttribute('aria-busy');
      }
    }
    loadTrades();
  })();
</script>
